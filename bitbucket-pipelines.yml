image: node:18

pipelines:
  default:
    - step:
        name: Build and Test
        caches:
          - node
        script:
          - npm ci
          - npm run build:cli
          - node dist/cli/cli.js vm-start --api-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/openapi.json
          - node dist/cli/cli.js test --swagger-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/openapi.json --token-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/token --username $API_USERNAME --password $API_PASSWORD --output test-results/junit.xml
        artifacts:
          - test-results/**

  branches:
    main:
      - step:
          name: Regression Tests
          caches:
            - node
          script:
            - npm ci
            - npm run build:cli
            - node dist/cli/cli.js vm-start --api-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/openapi.json
            - node dist/cli/cli.js test --swagger-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/openapi.json --token-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/token --username $API_USERNAME --password $API_PASSWORD --output test-results/junit.xml
          artifacts:
            - test-results/**

  pull-requests:
    '**':
      - step:
          name: PR Regression Tests
          caches:
            - node
          script:
            - npm ci
            - npm run build:cli
            - node dist/cli/cli.js vm-start --api-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/openapi.json
            - node dist/cli/cli.js test --swagger-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/openapi.json --token-url https://pdq.swedencentral.cloudapp.azure.com/dev/app/token --username $API_USERNAME --password $API_PASSWORD --output test-results/junit.xml
          artifacts:
            - test-results/**

  tags:
    'v*':
      - step:
          name: Build and Publish Docker Image
          services:
            - docker
          caches:
            - docker
          script:
            - export IMAGE_NAME="$DOCKERHUB_USERNAME/api-contract-guard"
            - export VERSION="${BITBUCKET_TAG#v}"
            - docker build -t "$IMAGE_NAME:$VERSION" -t "$IMAGE_NAME:latest" .
            - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            - docker push "$IMAGE_NAME:$VERSION"
            - docker push "$IMAGE_NAME:latest"

definitions:
  caches:
    node: node_modules
  services:
    docker:
      memory: 2048
